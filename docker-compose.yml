services:
  postgres:
    image: postgres:16
    container_name: robot-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - robot-postgres-data:/var/lib/postgresql/data
volumes:
  robot-postgres-data: